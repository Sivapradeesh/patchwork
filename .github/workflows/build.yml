name: Build APK on Push

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version from build.gradle.kts
        id: version
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "TAG_NAME=v$VERSION_NAME" >> $GITHUB_ENV
          echo "APK_NAME=patchwork-v${VERSION_NAME}.apk" >> $GITHUB_ENV
          echo "Detected version: $VERSION_NAME (code: $VERSION_CODE)"

      - name: Build APK
        run: |
          if [ -n "${{ secrets.KEYSTORE_FILE }}" ]; then
            echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > release.keystore
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleDebug --no-daemon
          fi
        env:
          KEYSTORE_FILE_BASE64: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mkdir -p release-artifacts
          if   [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            cp app/build/outputs/apk/release/app-release.apk "release-artifacts/${{ env.APK_NAME }}"
          elif [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk "release-artifacts/${{ env.APK_NAME }}"
          else
            cp app/build/outputs/apk/debug/app-debug.apk "release-artifacts/${{ env.APK_NAME }}"
          fi
          echo "Built APK: ${{ env.APK_NAME }}"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: patchwork-${{ env.TAG_NAME }}
          path: release-artifacts/${{ env.APK_NAME }}
          retention-days: 90

      - name: Create or update Git tag
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Delete remote tag if it already points to a different commit (version re-release)
          git push origin :refs/tags/${{ env.TAG_NAME }} 2>/dev/null || true
          git tag -fa "${{ env.TAG_NAME }}" -m "Release ${{ env.TAG_NAME }}"
          git push origin "${{ env.TAG_NAME }}"

      - name: Create or update GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Patchwork ${{ env.TAG_NAME }}
          make_latest: true
          draft: false
          prerelease: false
          files: release-artifacts/${{ env.APK_NAME }}
          body: |
            ## Patchwork ${{ env.TAG_NAME }}

            **Version Code:** ${{ env.VERSION_CODE }}
            **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ### Install
            1. Download `${{ env.APK_NAME }}` below
            2. Enable **Install from unknown sources** in Settings → Apps
            3. Install the APK and grant requested permissions

            ### Features
            - 🛠️ **Tools**: Maps Power Saving, Travel Alarm, DIY Automation, Button Remap, App Freezing
            - 🔒 **Security**: App Lock, Screen Locked Security
            - 🎨 **Visuals**: Status Bar Icons, Notification Lighting, Dynamic Night Light
            - ⚡ **Quick Tiles**: 20+ system toggles
            - 🎹 **Extras**: Custom Keyboard, Watermark, Battery Monitor

            ### Requirements
            - Android 8.0+ | Android 13+ recommended for full features
            - Optional: Shizuku or Root for advanced features

            ### Links
            - 📖 [Documentation](https://github.com/${{ github.repository }}/blob/main/README.md)
            - 🐛 [Report Issues](https://github.com/${{ github.repository }}/issues)
            - 💬 [Telegram](https://t.me/tidwib)

            ---
            Built with ❤️ by [Tino Britty J](https://github.com/brittytino)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ APK built for this PR!\n\n**Version:** ${{ env.TAG_NAME }}\n\nDownload from the Actions artifacts section above.`
            })

